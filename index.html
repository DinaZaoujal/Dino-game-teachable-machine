<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css" />
</head>
<body>

  <!-- SCHERM 1: START -->
  <div id="screen-1" class="screen active">

    <!-- Camera preview + voorspelling -->
    <div id="s1-cam">
      <canvas id="s1-canvas"></canvas>
      <p id="s1-pred">camera laden…</p>
    </div>

    <!-- Titel + start knop -->
    <div id="s1-main">
      <h1 id="s1-title">DINO<br>GAME</h1>
      <button id="s1-start-btn">▶ Start</button>
      <p id="s1-hint">👋 Zwaai met je hand om te starten!</p>
    </div>

    <!-- Decoraties -->
    <img id="dino-s1"   src="assets/Dino.svg"   alt="" />
    <img id="cactus-s1" src="assets/Cactus.svg" alt="" />
    <canvas id="ground-canvas-s1"></canvas>
  </div>

  <!-- SCHERM 2: INSTRUCTIES -->
  <div id="screen-2" class="screen">
    <div class="instruction-box">
      <h2>instruction</h2>
      <p class="sub">How to Play?</p>
      <div class="rules">
        2 handen omhoog = springen 🙌<br>
        Geen hand = lopen 🏃<br>
        Vermijd de cactus! 🌵
      </div>
      <button class="play-btn" id="play-btn">▶ Start Game</button>
    </div>
  </div>

  <!-- SCHERM 3: GAME -->
  <div id="screen-3" class="screen">
    <div id="score-display">Score: <span id="score-val">0</span></div>
    <canvas id="s3-canvas"></canvas>
    <p id="s3-pred"></p>
    <img id="dino"    src="assets/Dino.svg"   alt="" />
    <img id="cactus"  src="assets/Cactus.svg" alt="" />
    <img id="cactus2" src="assets/Cactus.svg" alt="" style="display:none; position:absolute;" />
    <canvas id="ground-canvas-s3"></canvas>
  </div>

  <!-- SCHERM 4: GAME OVER -->
  <div id="screen-4" class="screen">
    <canvas id="s4-canvas"></canvas>
    <div id="gameover-box">
      <p class="score-lbl">Score <span id="final-score">0</span></p>
      <p class="go-lbl">Game over</p>
      <button class="retry-btn" id="retry-btn">▶ Opnieuw</button>
    </div>
    <img id="dino-dead" src="assets/Dino.svg" alt="" />
    <canvas id="ground-canvas-s4"></canvas>
  </div>

  <!-- TensorFlow + Teachable Machine POSE (niet image!) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

  <!-- Game scripts — volgorde is belangrijk -->
  <script src="js/screens.js"></script>
  <script src="js/ground.js"></script>
  <script src="js/teachable.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
