<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Game</title>
  <style>
    body {
      background-color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;

      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .title {
      position: absolute;
      top: 30%;
      text-align: center;
    }

    .title h1 {
      font-size: 32px;
      letter-spacing: 4px;

      margin-bottom: 10px;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    .dino {
      position: absolute;
      bottom: 60px;
      left: 80px;
      width: 80px;
    }

    .ground {
      width: 100%;
      height: 20px;
      object-fit: cover;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="title">
    <h1>Dino Game</h1>
    <p class="hint">Press to Start</p>
  </div>

  <img class="dino" src="Dino.png" alt="dino" />
  <img class="ground" src="Ground.png" alt="ground" />

</body>
</html>
